format = """
$time\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$line_break\
$username\
$character"""

right_format = """$cmd_duration"""
add_newline = false

[time]
disabled = false
format = "[\\[$time\\]](bold purple) "

[username]
show_always = true
format = "[$user](blue)"

[hostname]
ssh_only = false
format = '[$ssh_symbol$hostname:](bold black)'

[directory]
truncation_length = 0
truncation_symbol = ' Óôù '
format = '[$path]($style)[$read_only]($read_only_style)'
style = "bold black"

[character]
success_symbol = "[ ‚ùØ](bold green)"
error_symbol = "[ ‚ùØ](bold red)"

[git_branch]
format = " [$symbol$branch]($style)"
symbol = "Ôêò "

[git_commit]
format = ' [\($hash$tag\)]($style) '

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
